<h2>Penthouse Project PDFs</h2>
<div class="container">
    <h2>Download & View Project Files</h2>

    <div class="pdf-list" id="pdfList">
        <!-- JS will populate this -->
    </div>
</div>

<script>
    const projectPDFs = [
        { title: "Unique height", file: "pdf/ALL FLOOR PLANS_R3_(16TH MARCH' 2025).pdf" },
        { title: "zen Garden", file: "pdf/LANDSCAPE PLAN.pdf" },
        { title: "Unique vision", file: "pdf/OPTION_01.pdf" }
    ];

    const pdfListContainer = document.getElementById('pdfList');

    projectPDFs.forEach(project => {
        const item = document.createElement('div');
        item.className = 'pdf-item';

        item.innerHTML = `
            <div class="pdf-title">${project.title}</div>
            <div class="btn-group">
                <a href="${project.file}" target="_blank" class="view-btn">View</a>
                <a href="${project.file}" download class="download-btn">Download</a>
            </div>
        `;

        pdfListContainer.appendChild(item);
    });
</script>
