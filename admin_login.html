<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin Login | OBSTRECTED</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background:
                linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)),
                url('style/image/1.jpg') center/cover no-repeat fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        .brand {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: fadeDown 0.6s ease;
        }

        .brand h1 {
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .brand p {
            font-size: 15px;
            color: #ccc;
            margin-top: 6px;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 20px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 460px;
            overflow: hidden;
            animation: fadeUp 0.6s ease;
            --accent: #4e4376;
            --accent-glow: rgba(78, 67, 118, 0.15);
            --btn-bg: linear-gradient(135deg, #2b5876, #4e4376);
            --btn-hover: linear-gradient(135deg, #234760, #3d345c);
            --btn-shadow: rgba(43, 88, 118, 0.4);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel {
            padding: 40px 38px 36px;
        }

        .panel-icon {
            text-align: center;
            font-size: 40px;
            margin-bottom: 8px;
        }

        .panel h2 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 4px;
            color: #1a1a2e;
        }

        .panel .subtitle {
            text-align: center;
            font-size: 13px;
            color: #888;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: all 0.3s;
            background: #fafafa;
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            background: white;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: var(--btn-bg);
            margin-top: 15px;
            letter-spacing: 0.5px;
        }

        .login-btn:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px var(--btn-shadow);
        }

        .error-msg {
            color: #dc3545;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            padding: 8px;
            background: rgba(220, 53, 69, 0.08);
            border-radius: 8px;
            display: none;
        }

        .login-footer {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-top: 22px;
            text-align: center;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="brand">
        <h1>OBSTRECTED</h1>
        <p>Professional Architecture & House Design Studio</p>
    </div>

    <div class="login-card">
        <div class="panel">
            <div class="panel-icon">⚙️</div>
            <h2>Master Admin</h2>
            <p class="subtitle">System Oversight & Management</p>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="admin-user" placeholder="Enter admin username" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="admin-pass" placeholder="Enter admin password" autocomplete="current-password">
            </div>
            <button class="login-btn" onclick="loginAdmin()">Sign In to Dashboard →</button>
            <div class="error-msg" id="admin-err">❌ Invalid credentials or not an admin.</div>

            <div class="back-link">
                <a href="index.html">← Back to Main Login</a>
            </div>
        </div>
    </div>

    <div class="login-footer">© 2026 OBSTRECTED Architecture | All Rights Reserved</div>

    <script>
        fetch('/api/auth/admin-me')
            .then(r => { if (r.ok) return r.json(); throw new Error(); })
            .then(({ user }) => {
                if (user && user.role === 'admin') window.location.href = '/admin_dashboard.html';
            })
            .catch(() => { /* not logged in as admin — stay on page */ });

        async function loginAdmin() {
            const u   = document.getElementById('admin-user').value.trim();
            const p   = document.getElementById('admin-pass').value.trim();
            const err = document.getElementById('admin-err');
            const btn = document.querySelector('.login-btn');
            
            btn.textContent = 'Signing in…';
            btn.disabled = true;
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p, role: 'admin' })
                });
                
                if (res.ok) {
                    window.location.href = '/admin_dashboard.html';
                } else {
                    err.style.display = 'block';
                    document.getElementById('admin-pass').value = '';
                }
            } catch {
                err.style.display = 'block';
                err.textContent = '❌ Server error. Is the server running?';
            }
            
            btn.textContent = 'Sign In to Dashboard →';
            btn.disabled = false;
        }

        // Enter key support
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                loginAdmin();
            }
        });
    </script>

</body>

</html>
